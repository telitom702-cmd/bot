<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Bot Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glow-blue { box-shadow: 0 0 30px rgba(59,130,246,0.2); }
        .glow-green { box-shadow: 0 0 30px rgba(34,197,94,0.2); }
        .glow-red { box-shadow: 0 0 30px rgba(239,68,68,0.2); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight">Admin Dashboard</h1>
            <div class="flex gap-2">
                <span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-500/20 text-green-400 border border-green-500/30">LIVE</span>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-2xl p-6 glow-blue">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-zinc-400 text-sm font-medium">মোট ইউজার</span>
                    <i data-lucide="users" class="w-5 h-5 text-blue-500"></i>
                </div>
                <p id="totalUsers" class="text-3xl font-bold tracking-tight">0</p>
                <p class="text-xs text-green-400 mt-2">+12% গত সপ্তাহে</p>
            </div>
            <div class="glass rounded-2xl p-6 glow-green">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-zinc-400 text-sm font-medium">সম্পন্ন টাস্ক</span>
                    <i data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>
                </div>
                <p class="text-3xl font-bold tracking-tight">1,245</p>
                <p class="text-xs text-green-400 mt-2">+8% আজ</p>
            </div>
            <div class="glass rounded-2xl p-6 glow-red">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-zinc-400 text-sm font-medium">পেন্ডিং উইথড্র</span>
                    <i data-lucide="clock" class="w-5 h-5 text-red-500"></i>
                </div>
                <p id="pendingWithdraws" class="text-3xl font-bold tracking-tight">0</p>
                <p class="text-xs text-red-400 mt-2">দ্রুত একশন নিন</p>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-zinc-400 text-sm font-medium">ফ্রড সনাক্ত</span>
                    <i data-lucide="shield-alert" class="w-5 h-5 text-orange-500"></i>
                </div>
                <p class="text-3xl font-bold tracking-tight">3</p>
                <p class="text-xs text-orange-400 mt-2">ফেক আইপি ট্র্যাক</p>
            </div>
        </div>

        <!-- Analytics & Activity -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Chart Placeholder -->
            <div class="lg:col-span-2 glass rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4">ইউজার গ্রোথ (সপ্তাহ)</h3>
                <div class="h-64 flex items-end gap-2">
                    <div class="flex-1 bg-blue-500/20 rounded-t-lg" style="height: 40%"></div>
                    <div class="flex-1 bg-blue-500/30 rounded-t-lg" style="height: 60%"></div>
                    <div class="flex-1 bg-blue-500/40 rounded-t-lg" style="height: 45%"></div>
                    <div class="flex-1 bg-blue-500/50 rounded-t-lg" style="height: 80%"></div>
                    <div class="flex-1 bg-blue-500/60 rounded-t-lg" style="height: 65%"></div>
                    <div class="flex-1 bg-blue-500/80 rounded-t-lg" style="height: 90%"></div>
                    <div class="flex-1 bg-blue-500 rounded-t-lg" style="height: 100%"></div>
                </div>
            </div>

            <!-- Recent Logs -->
            <div class="glass rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4">সাম্প্রতিক লগ</h3>
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        <div>
                            <p class="text-sm font-medium">নতুন ইউজার জয়েন</p>
                            <p class="text-xs text-zinc-500">2 মিনিট আগে</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-red-500"></div>
                        <div>
                            <p class="text-sm font-medium">ফ্রড সনাক্ত (আইপি ম্যাচ)</p>
                            <p class="text-xs text-zinc-500">15 মিনিট আগে</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        <div>
                            <p class="text-sm font-medium">উইথড্র রিকোয়েস্ট</p>
                            <p class="text-xs text-zinc-500">1 ঘন্টা আগে</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Fetch real stats from Bot API
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalUsers').innerText = data.totalUsers;
                document.getElementById('pendingWithdraws').innerText = data.pendingWithdraws;
            } catch (e) {
                console.log("Waiting for API...");
            }
        }
        loadStats();
        setInterval(loadStats, 5000); // Real-time update
    </script>
</body>
</html>
